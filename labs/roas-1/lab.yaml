lab:
  id: inter-vlan-routing
  title: ROAS 1
  topic: Switching & Routing
  difficulty: Intermediate
  estimated_time_minutes: 40
  objective: 'Configure Router-on-a-Stick to allow communication between multiple
    VLANs.

    '
  prerequisites:
  - VLAN and Trunking concepts
  - IP Subnetting
  command_reference:
  - command: vlan <id>
    description: Create a VLAN
  - command: switchport mode access
    description: Set port to access mode
  - command: switchport access vlan <id>
    description: Assign VLAN to access port
  - command: switchport trunk encapsulation dot1q
    description: Set trunk encapsulation type
  - command: switchport mode trunk
    description: Set port to trunk mode
  - command: encapsulation dot1Q <vlan-id>
    description: Assign sub-interface to a VLAN
  - command: ip dhcp pool <name>
    description: Create a DHCP pool
  nodes:
  - name: R1
    host: 100.120.167.31
    console_port: 5000
    device_type: cisco_ios_telnet
  - name: SW1
    host: 100.120.167.31
    console_port: 5001
    device_type: cisco_iol_l2
  - name: PC1
    host: 100.120.167.31
    console_port: 5002
    device_type: vpcs
  - name: PC2
    host: 100.120.167.31
    console_port: 5003
    device_type: vpcs
  tasks:
  - id: 1
    description: Configure the Switch (SW1)
    instructions: '1. Create VLAN 10 and VLAN 20.

      2. Configure Eth0/1 as an access port for VLAN 10.

      3. Configure Eth0/2 as an access port for VLAN 20.

      4. Configure Eth0/0 (the link to the router) as an 802.1Q trunk port.

      '
    hint: Use `switchport mode access` for PC ports, and `switchport trunk encapsulation
      dot1q` followed by `switchport mode trunk` for the router link.
  - id: 2
    description: Configure the Router (R1)
    instructions: '1. Enable the physical interface Eth0/0 (`no shutdown`).

      2. Create sub-interfaces `Ethernet0/0.10` and `Ethernet0/0.20`.

      3. Set the encapsulation type to dot1Q and specify the VLAN ID on each sub-interface.

      4. Assign IP `192.168.10.1 255.255.255.0` to Eth0/0.10 and `192.168.20.1 255.255.255.0`
      to Eth0/0.20.

      '
    hint: Remember to use `encapsulation dot1Q 10` on the sub-interface before assigning
      the IP address.
  - id: 3
    description: Configure DHCP on the Router
    instructions: '1. Create two DHCP pools (e.g., `VLAN10` and `VLAN20`).

      2. For VLAN 10, use `network 192.168.10.0 255.255.255.0` and `default-router
      192.168.10.1`.

      3. For VLAN 20, use `network 192.168.20.0 255.255.255.0` and `default-router
      192.168.20.1`.

      4. Specify a DNS server if desired (e.g., `dns-server 8.8.8.8`).

      '
    hint: The command is `ip dhcp pool VLAN10`, then `network ...`, `default-router
      ...`, etc.
  - id: 4
    description: Test Connectivity
    instructions: '1. Console into PC1 and PC2 and request a DHCP address (`ip dhcp`).

      2. Ping PC2 from PC1 to verify that Inter-VLAN routing is working!

      '
    hint: PC1 should get an IP in 192.168.10.x, and PC2 should get an IP in 192.168.20.x.
  links:
  - - R1
    - Ethernet0/0
    - SW1
    - Ethernet0/0
  - - SW1
    - Ethernet0/1
    - PC1
    - Ethernet0/0
  - - SW1
    - Ethernet0/2
    - PC2
    - Ethernet0/0
