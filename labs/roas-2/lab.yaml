lab:
  id: comprehensive-lab
  title: "Lab 05 — Router on a Stick II"
  topic: Routing & Switching
  difficulty: Advanced
  estimated_time_minutes: 60
  objective: 'Combine multiple core CCNA concepts to build a fully functional enterprise
    branch network. Configure Inter-switch trunking, VLAN segregation, Router-on-a-stick,
    and DHCP services.

    '
  prerequisites:
  - VLANs & Trunks (802.1Q)
  - DHCP Services
  - Subinterfaces
  command_reference:
  - command: switchport mode trunk
    description: Force interface into trunking mode
  - command: switchport access vlan <id>
    description: Assign port to a VLAN
  - command: encapsulation dot1Q <vlan>
    description: Set 802.1Q tag on a subinterface
  - command: ip dhcp pool <name>
    description: Create a DHCP pool
  nodes:
  - name: R1
    host: 100.120.167.31
    console_port: 5000
    device_type: cisco_ios_telnet
  - name: S1
    host: 100.120.167.31
    console_port: 5001
    device_type: cisco_iol_l2
  - name: S2
    host: 100.120.167.31
    console_port: 5002
    device_type: cisco_iol_l2
  - name: PC0
    host: 100.120.167.31
    console_port: 5003
    device_type: vpcs
  - name: PC1
    host: 100.120.167.31
    console_port: 5004
    device_type: vpcs
  - name: PC2
    host: 100.120.167.31
    console_port: 5005
    device_type: vpcs
  - name: PC3
    host: 100.120.167.31
    console_port: 5006
    device_type: vpcs
  tasks:
  - id: 1
    description: Inter-Switch Trunking (S1 & S2)
    instructions: 'Configure a trunk link between **S1** and **S2** to carry multiple
      VLANs.


      1. On **S1**, configure `Ethernet0/0` as a trunk.

      2. On **S2**, configure `Ethernet0/1` as a trunk.

      3. On **S2**, configure `Ethernet0/0` as a trunk (this connects to R1).

      '
    hint: Use `switchport mode trunk` on each of the interfaces listed above.
  - id: 2
    description: VLANs & Access Ports (S1)
    instructions: 'Configure **S1** for the Blue (VLAN 10) and Red (VLAN 20) departments.


      1. Create VLAN 10, VLAN 20, and VLAN 30 on **S1**.

      2. Assign `Ethernet0/1` to VLAN 10 (PC0).

      3. Assign `Ethernet0/2` to VLAN 20 (PC1).

      '
    hint: Use `vlan <id>` to create them, then `switchport mode access` and `switchport
      access vlan <id>` on the interfaces.
  - id: 3
    description: VLANs & Access Ports (S2)
    instructions: 'Configure **S2** for the Purple (VLAN 30) and Red (VLAN 20) departments.


      1. Create VLAN 10, VLAN 20, and VLAN 30 on **S2**.

      2. Assign `Ethernet0/2` to VLAN 30 (PC2).

      3. Assign `Ethernet0/3` to VLAN 20 (PC3).

      '
    hint: Ensure all VLANs exist on both switches so traffic can flow across the trunk.
  - id: 4
    description: Router-on-a-stick (R1)
    instructions: 'Configure **R1** to route between VLANs 10, 20, and 30.


      1. Enable the physical interface `Ethernet0/0`.

      2. Create subinterface `Ethernet0/0.10` for VLAN 10 (IP `192.168.10.1/24`).

      3. Create subinterface `Ethernet0/0.20` for VLAN 20 (IP `192.168.20.1/24`).

      4. Create subinterface `Ethernet0/0.30` for VLAN 30 (IP `192.168.30.1/24`).

      '
    hint: Use `encapsulation dot1Q <vlan>` before assigning the IP address.
  - id: 5
    description: DHCP Services (R1)
    instructions: 'Configure **R1** to act as a DHCP server for all three VLANs.


      1. Create DHCP pool `VLAN10` for network `192.168.10.0/24` (default router `192.168.10.1`).

      2. Create DHCP pool `VLAN20` for network `192.168.20.0/24` (default router `192.168.20.1`).

      3. Create DHCP pool `VLAN30` for network `192.168.30.0/24` (default router `192.168.30.1`).

      '
    hint: Use `ip dhcp pool <name>`, then `network <ip> <mask>` and `default-router
      <ip>`.
  links:
  - - S1
    - Ethernet0/0
    - S2
    - Ethernet0/1
  - - S2
    - Ethernet0/0
    - R1
    - Ethernet0/0
  - - S1
    - Ethernet0/1
    - PC0
    - Ethernet0/0
  - - S1
    - Ethernet0/2
    - PC1
    - Ethernet0/0
  - - S2
    - Ethernet0/2
    - PC2
    - Ethernet0/0
  - - S2
    - Ethernet0/3
    - PC3
    - Ethernet0/0
  checks:
  - node: PC0
    type: ping
    target: 192.168.10.1
    description: "PC0 (VLAN10) pings R1 VLAN10 gateway - Subinterface reachable"
  - node: PC1
    type: ping
    target: 192.168.20.1
    description: "PC1 (VLAN20) pings R1 VLAN20 gateway - Subinterface reachable"
  - node: PC2
    type: ping
    target: 192.168.30.1
    description: "PC2 (VLAN30) pings R1 VLAN30 gateway - Subinterface reachable"
  - node: PC3
    type: ping
    target: 192.168.20.1
    description: "PC3 (VLAN20 via S2) pings R1 VLAN20 gateway - Subinterface reachable"
