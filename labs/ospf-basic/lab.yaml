lab:
  id: "ospf-basic"
  title: "Basic OSPF Configuration"
  topic: "OSPF"
  difficulty: "Beginner"
  estimated_time_minutes: 30
  objective: |
    Configure a basic OSPF Area 0 adjacency on the point-to-point link between R1 and R2 to establish dynamic routing.

  prerequisites:
    - "Basic router navigation"
    - "Subnet masks and wildcard masks"

  command_reference:
    - command: "router ospf <process-id>"
      description: "Start OSPF routing process"
    - command: "network <ip> <wildcard> area <id>"
      description: "Advertise network into OSPF"
    - command: "show ip ospf neighbor"
      description: "Verify OSPF adjacencies"
    - command: "show ip route ospf"
      description: "Verify OSPF learned routes"

  nodes:
    - name: R1
      host: "100.120.167.31"
      console_port: 5000
      device_type: "cisco_ios_telnet"

    - name: R2
      host: "100.120.167.31"
      console_port: 5001
      device_type: "cisco_ios_telnet"

  tasks:
    - id: 1
      description: "R1 Interface Provisioning"
      instructions: |
        Provision the point-to-point link on **R1** (`192.168.1.1/24`).

        1. Access the **R1** terminal.
        2. Assign IP `192.168.1.1/24` to `Ethernet0/0`.
        3. Enable the interface (`no shutdown`).
      hint: "Did you configure `ip address 192.168.1.1 255.255.255.0` on interface Ethernet0/0 and type `no shutdown`?"

    - id: 2
      description: "R2 Interface Provisioning"
      instructions: |
        Provision the point-to-point link on **R2** (`192.168.1.2/24`).

        *Note: R2 connects via **Ethernet0/1**!*

        1. Access the **R2** terminal.
        2. Assign IP `192.168.1.2/24` to `Ethernet0/1`.
        3. Enable the interface.
      hint: "Did you configure `ip address 192.168.1.2 255.255.255.0` on interface Ethernet0/1 and type `no shutdown`?"

    - id: 3
      description: "OSPF Initialization & Advertisement"
      instructions: |
        Dynamic routing requires a locally significant Process ID.
        
        1. On **R1**, enter global configuration mode.
        2. Start OSPF with Process ID **1** (`router ospf 1`).
        3. Advertise `192.168.1.0` with wildcard `0.0.0.255` into Area 0.
        4. Repeat the OSPF configuration on **R2**.
      hint: "Use `router ospf 1` and `network 192.168.1.0 0.0.0.255 area 0`."

    - id: 4
      description: "Adjacency Verification"
      instructions: |
        When OSPF synchronizes successfully, the neighbor state transitions to **FULL**.

        1. Verify adjacency: `show ip ospf neighbor`
        2. Verify data plane connectivity: `ping 192.168.1.2`
      hint: "If OSPF is configured correctly, `show ip ospf neighbor` should display a neighbor with the state FULL."
