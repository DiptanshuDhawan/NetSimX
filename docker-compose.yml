version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    container_name: netlabx-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: netlabx-backend
    ports:
      - "8000:8000"
    environment:
      - GNS3_HOST=gns3-server
      - FRONTEND_URL=http://localhost:3000
      - LABS_DIR=./labs
    volumes:
      # Persist the database and labs between container restarts
      - ./backend/db:/app/db
      - ./labs:/app/labs
      - ./images:/app/images
    depends_on:
      - gns3-server
    restart: unless-stopped

  gns3-server:
    build: ./gns3-server
    container_name: gns3-server
    command: gns3server --host 0.0.0.0 --port 3080 -A
    privileged: true
    ports:
      - "3080:3080"
      - "5000-5100:5000-5100" # Console ports for IOU/IOL devices
    volumes:
      # Mount images folder directly so users can drop Cisco images here
      - ./images:/root/GNS3/images/IOU
      # Mount projects folder so pre-made GNS3 labs are instantly available
      - ./projects:/root/GNS3/projects
      - gns3-data:/root/GNS3
    restart: unless-stopped

volumes:
  gns3-data:
