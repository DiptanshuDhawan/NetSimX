<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Accent Gradient for Text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Network Pattern -->
    <pattern id="network" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#475569" opacity="0.3" />
      <circle cx="80" cy="50" r="1.5" fill="#475569" opacity="0.4" />
      <circle cx="40" cy="80" r="2.5" fill="#475569" opacity="0.2" />
      <path d="M 20 20 L 80 50 L 40 80 Z" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3" />
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="1000" height="250" fill="url(#bg)" />
  <rect width="1000" height="250" fill="url(#network)" />

  <!-- Decorative Network Nodes (Right side) -->
  <g transform="translate(750, 125)" opacity="0.6">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#38BDF8" stroke-width="2" stroke-dasharray="4 4"/>
    <circle cx="0" cy="0" r="6" fill="#38BDF8" filter="url(#glow)"/>
    
    <line x1="0" y1="0" x2="-80" y2="-50" stroke="#38BDF8" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-80" cy="-50" r="4" fill="#38BDF8" />
    
    <line x1="0" y1="0" x2="60" y2="-60" stroke="#38BDF8" stroke-width="1.5" opacity="0.5"/>
    <circle cx="60" cy="-60" r="4" fill="#38BDF8" />
    
    <line x1="0" y1="0" x2="70" y2="40" stroke="#38BDF8" stroke-width="1.5" opacity="0.5"/>
    <circle cx="70" cy="40" r="4" fill="#38BDF8" />
    
    <line x1="0" y1="0" x2="-50" y2="60" stroke="#38BDF8" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-50" cy="60" r="4" fill="#38BDF8" />
  </g>

  <!-- Title Text -->
  <g transform="translate(80, 130)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="72" fill="#FFFFFF" letter-spacing="2">
      INSTANT<tspan fill="url(#textGrad)">NODES</tspan>
    </text>
    <text x="5" y="40" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="20" fill="#94A3B8" letter-spacing="1">
      Browser-Based CCNA Lab Environment
    </text>
  </g>

</svg>
